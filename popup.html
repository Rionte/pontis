<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AccessEase Navigator</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">AccessEase</p>
          <h1>Navigator</h1>
        </div>
        <button id="resetSettings" class="icon-button" type="button" aria-label="Reset settings" title="Reset settings">
          <span aria-hidden="true">R</span>
        </button>
      </header>

      <details class="mode-section" open>
        <summary class="section-heading">
          <div>
            <h2 id="dyslexia-title">Dyslexia Support</h2>
            <p>Adjust typography and soften page colors.</p>
          </div>
          <span class="chevron" aria-hidden="true">v</span>
        </summary>

        <div class="settings-panel">
          <label class="switch">
            <input id="dyslexiaEnabled" type="checkbox">
            <span class="slider" aria-hidden="true"></span>
            <span class="switch-label">Enable dyslexia support</span>
          </label>

          <label class="field">
            <span>Reading font</span>
            <select id="dyslexiaFont">
              <option value="OpenDyslexic, Comic Sans MS, Trebuchet MS, Verdana, Arial, sans-serif">OpenDyslexic</option>
              <option value="Lexend, Trebuchet MS, Verdana, Arial, sans-serif">Lexend</option>
              <option value="Atkinson Hyperlegible, Verdana, Arial, sans-serif">Atkinson Hyperlegible</option>
              <option value="Georgia, Times New Roman, serif">Georgia</option>
              <option value="Verdana, Arial, sans-serif">Verdana</option>
            </select>
          </label>

          <label class="range-field">
            <span>Text size <output id="dyslexiaTextSizeValue">17px</output></span>
            <input id="dyslexiaTextSize" type="range" min="14" max="24" step="1">
          </label>

          <label class="range-field">
            <span>Line spacing <output id="dyslexiaLineHeightValue">1.6x</output></span>
            <input id="dyslexiaLineHeight" type="range" min="1.5" max="2.2" step="0.1">
          </label>

          <label class="field checkbox-field">
            <input id="dyslexiaBoldRandomWords" type="checkbox">
            <span>Bold random words on the page</span>
          </label>

          <label class="range-field">
            <span>Bold amount <output id="dyslexiaBoldFrequencyValue">16%</output></span>
            <input id="dyslexiaBoldFrequency" type="range" min="6" max="35" step="1">
          </label>

          <label class="field checkbox-field">
            <input id="dyslexiaRemoveDecorations" type="checkbox">
            <span>Remove italics and underlines</span>
          </label>

          <div class="color-grid" aria-label="Dyslexia colors">
            <label class="color-field">
              <span>Background</span>
              <input id="dyslexiaBackground" type="color">
            </label>
            <label class="color-field">
              <span>Text</span>
              <input id="dyslexiaTextColor" type="color">
            </label>
          </div>
        </div>
      </details>

      <details class="mode-section" open>
        <summary class="section-heading">
          <div>
            <h2 id="adhd-title">ADHD Support</h2>
            <p>Use tighter reading blocks and stronger contrast.</p>
          </div>
          <span class="chevron" aria-hidden="true">v</span>
        </summary>

        <div class="settings-panel">
          <label class="switch">
            <input id="adhdEnabled" type="checkbox">
            <span class="slider" aria-hidden="true"></span>
            <span class="switch-label">Enable ADHD support</span>
          </label>

          <label class="field checkbox-field">
            <input id="adhdBreakBlocks" type="checkbox">
            <span>Break long paragraphs into separate paragraphs</span>
          </label>

          <label class="range-field">
            <span>Paragraph length <output id="adhdBlockLengthValue">280 chars</output></span>
            <input id="adhdBlockLength" type="range" min="160" max="520" step="20">
          </label>

          <div class="color-grid" aria-label="ADHD colors">
            <label class="color-field">
              <span>Background</span>
              <input id="adhdBackground" type="color">
            </label>
            <label class="color-field">
              <span>Text</span>
              <input id="adhdTextColor" type="color">
            </label>
            <label class="color-field">
              <span>Accent</span>
              <input id="adhdAccentColor" type="color">
            </label>
          </div>
        </div>
      </details>

      <p id="saveState" class="save-state" role="status" aria-live="polite">Settings saved automatically.</p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
